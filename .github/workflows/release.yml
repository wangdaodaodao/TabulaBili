name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v4

      - name: 📦 打包 Chrome 扩展 ZIP
        run: |
          zip -r TabulaBili-${{ github.ref_name }}.zip . -x "*.git*" -x ".github/*" -x ".gitignore" -x "README.md" -x "LICENSE" -x "*.DS_Store" -x "*.pem" -x "*.crx"
          
      - name: 🚀 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: TabulaBili ${{ github.ref_name }}
          files: TabulaBili-${{ github.ref_name }}.zip
          generate_release_notes: true